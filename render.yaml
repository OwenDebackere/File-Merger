services:
  - type: web
    name: file-merger
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: RATE_LIMIT_MAX
        value: 60
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: MAX_TOTAL_UPLOAD_MB
        value: 200
      - key: MAX_FILES
        value: 30
      - key: MAX_CONCURRENT_MERGES
        value: 5
      - key: REQUEST_TIMEOUT_MS
        value: 120000
