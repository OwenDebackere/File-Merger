<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Merger - PDF & Image Merger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
      text-align: center;
    }

    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .upload-area {
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 30px;
      background-color: #f8f9ff;
    }

    .upload-area:hover {
      border-color: #764ba2;
      background-color: #f0f1ff;
    }

    .upload-area.dragover {
      border-color: #764ba2;
      background-color: #e8ecff;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .upload-text {
      color: #333;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .upload-hint {
      color: #999;
      font-size: 13px;
    }

    input[type="file"] {
      display: none;
    }

    .file-list {
      margin-bottom: 30px;
      max-height: 300px;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 14px;
      word-break: break-word;
    }

    .file-item-name {
      color: #333;
      flex: 1;
    }

    .file-item-size {
      color: #999;
      font-size: 12px;
      margin-right: 15px;
      white-space: nowrap;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .remove-btn:hover {
      transform: scale(1.2);
    }

    .buttons {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .merge-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .merge-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .merge-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .clear-btn {
      background: #ecf0f1;
      color: #333;
    }

    .clear-btn:hover {
      background: #d5dbdb;
    }

    .message {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .spinner {
      display: none;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .merge-btn.loading {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .merge-btn.loading .spinner {
      display: block;
      margin-right: 8px;
    }

    .file-count {
      color: #667eea;
      font-weight: 600;
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
    }

    .note {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 File Merger</h1>
    <p class="subtitle">Merge PDFs and images into a single PDF</p>

    <div id="message" class="message"></div>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <div class="upload-text">Click or drag files here</div>
      <div class="upload-hint">Supports PDF, PNG, JPG, GIF, BMP, WebP</div>
      <input type="file" id="fileInput" multiple accept=".pdf,.png,.jpg,.jpeg,.gif,.bmp,.webp">
    </div>

    <div class="file-list" id="fileList"></div>
    <div class="file-count" id="fileCount"></div>

    <div class="buttons">
      <button class="merge-btn" id="mergeBtn" disabled>
        <div class="spinner"></div>
        Merge Files
      </button>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>

    <div class="note">
      ✓ Files will be merged in the order they appear above<br>
      ✓ Images will be automatically converted to PDF format
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const fileList = document.getElementById('fileList');
    const fileCount = document.getElementById('fileCount');
    const mergeBtn = document.getElementById('mergeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const messageDiv = document.getElementById('message');

    let selectedFiles = [];

    // Upload area click handler
    uploadArea.addEventListener('click', () => fileInput.click());

    // Drag and drop handlers
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    // File input handler
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    // Handle selected files
    function handleFiles(files) {
      const newFiles = Array.from(files).filter(file => {
        const ext = file.name.split('.').pop().toLowerCase();
        const validExts = ['pdf', 'png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp'];
        return validExts.includes(ext);
      });

      if (newFiles.length === 0) {
        showMessage('No valid files selected. Please choose PDF or image files.', 'error');
        return;
      }

      selectedFiles = [...selectedFiles, ...newFiles];
      updateFileList();
      showMessage(`${newFiles.length} file(s) added!`, 'success');
    }

    // Update file list display
    function updateFileList() {
      fileList.innerHTML = '';
      selectedFiles.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        const size = (file.size / 1024).toFixed(2);
        div.innerHTML = `
          <span class="file-item-name">${file.name}</span>
          <span class="file-item-size">${size} KB</span>
          <button class="remove-btn" onclick="removeFile(${index})" title="Remove">✕</button>
        `;
        fileList.appendChild(div);
      });

      // Update file count
      if (selectedFiles.length > 0) {
        fileCount.textContent = `${selectedFiles.length} file(s) selected`;
        mergeBtn.disabled = false;
      } else {
        fileCount.textContent = '';
        mergeBtn.disabled = true;
      }
    }

    // Remove file
    function removeFile(index) {
      selectedFiles.splice(index, 1);
      updateFileList();
      messageDiv.classList.remove('show');
    }

    // Clear all files
    clearBtn.addEventListener('click', () => {
      selectedFiles = [];
      fileInput.value = '';
      updateFileList();
      messageDiv.classList.remove('show');
    });

    // Show message
    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message show ${type}`;
      setTimeout(() => {
        messageDiv.classList.remove('show');
      }, 5000);
    }

    // Merge files
    mergeBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) {
        showMessage('Please select at least one file', 'error');
        return;
      }

      mergeBtn.disabled = true;
      mergeBtn.classList.add('loading');
      showMessage('Merging files...', 'info');

      const formData = new FormData();
      selectedFiles.forEach(file => {
        formData.append('files', file);
      });

      try {
        const response = await fetch('/merge', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to merge files');
        }

        // Download the merged PDF
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged.pdf';
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

        showMessage('✓ Files merged successfully! PDF is downloading...', 'success');
        selectedFiles = [];
        fileInput.value = '';
        updateFileList();

      } catch (error) {
        console.error('Error:', error);
        showMessage(`Error: ${error.message}`, 'error');
      } finally {
        mergeBtn.disabled = false;
        mergeBtn.classList.remove('loading');
      }
    });

    // Initial state
    updateFileList();
  </script>
</body>
</html>
